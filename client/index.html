<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The 7 Seconds Chog</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="loading">Sahne yükleniyor…</div>

<div id="loginScreen">
  <div class="loginCard">
    <h1 id="loginTitle">The 7 Seconds Chog</h1>
    <p id="loginDesc">Tek oda — odaya giren herkes aynı alanda birlikte olur. İsmini yaz ve gir.</p>
    <label id="nameLabel" for="nameInput">İsim</label>
    <input id="nameInput" maxlength="16" placeholder="Adını yaz">
    <div id="plateSection" style="display:none;">
      <label id="plateLabel">İsim Plakası</label>
      <div id="plateGrid"></div>
    </div>
    <button id="joinBtn">Odaya Gir</button>
    <div id="loginMsg"></div>
    <div id="credits" style="display:none;"></div>
  </div>
</div>

<div id="app">
  <div id="hud">
    <div id="title">The 7 Seconds Chog · Joystick: Yürü · Sürükle: Bak · HIZLAN: Basılı Tut</div>
    <div id="coinBar">
      <div id="coinBarTrack"><div id="coinBarFill"></div></div>
      <div id="coinBarLabel">Para: 7.0s</div>
    </div>
    <div id="scoreBadge"><span id="scoreLabel">Skor:</span> <b id="scoreVal">0</b></div>
    <div id="connBadge" title="Sunucu gecikmesi">●</div>
    <div id="leaderboardBtn">SIRALAMA</div>
    <div id="leaderboardPanel"><h3 id="lbTitle">Sıralama</h3><div id="lbList"></div></div>
    <div id="toast"></div>
    <div id="joyZone"></div>
    <div id="sprintBtn">HIZLAN</div>
    <div id="jumpBtn">ZIPLA</div>

    <div id="minimapWrap">
      <canvas id="minimapCanvas" width="140" height="140"></canvas>
    </div>
  </div>
</div>

<div id="mapOverlay">
  <div id="mapPanel">
    <div id="mapTitleBar">
      <span id="mapTitle">Harita</span>
      <span id="mapCloseBtn">✕</span>
    </div>
    <canvas id="mapCanvas" width="480" height="480"></canvas>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
